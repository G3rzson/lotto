<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottó</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu">
        <label for="jatekTípus">Melyik játékot szeretnéd gyakorolni:</label>
        <select id="jatekTípus" class="menu-select">
            <option class="menu-item" value="90">5-ös lottó</option>
            <option class="menu-item" value="45">6-os lottó</option>
            <option class="menu-item" value="35">7-es lottó</option>
        </select>
    </div>
    
    <div class="info">
        <p class="info-p">Az 5-ös lottóhoz válassz számot 1 és 90 között</p>
        <p class="info-p">A 6-os lottóhoz válassz számot 1 és 45 között</p>
        <p class="info-p">A 7-es lottóhoz válassz számot 1 és 35 között</p>
    </div>

    <div class="gomb-container">
        <button 
            class="gomb"
            onclick="jatekInditas()">
                Játék Indítása
        </button>
        <button 
            class="gomb"
            onclick="reset()">
                Újra
    </button>
    </div>
    
    <div id="eredmenyek" class="osszegzes">
        <!-- Eredmények jelennek meg itt -->
        <p id="vegeredmeny1" class="osszegzes-menu">Gépi számok:</p>
        <p id="vegeredmeny2" class="osszegzes-menu">Kézi számok:</p>
        <p id="vegeredmeny3" class="osszegzes-menu">Azonos elemek:</p>
        <p id="vegeredmeny4" class="osszegzes-menu">Találatok száma:</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
